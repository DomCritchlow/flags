# =============================================================================
# ambiguous_terms.yaml
# Congressional World View — Gazetteer: Ambiguous Term Disambiguation
#
# Terms that could refer to a country OR something else in U.S. congressional
# text. Each entry provides disambiguation rules with signal lists scored as
# "strong" (high confidence) or "moderate" (contributes to scoring).
#
# default: what the system assumes when no signals fire
#   STATE    — treat as U.S. state reference
#   PERSON   — treat as person name
#   COUNTRY  — treat as country reference
#   SKIP     — drop the match entirely (too ambiguous without context)
#
# Special flags:
#   require_full_name   — only match the full canonical name(s)
#   exact_spelling      — case-sensitive / spelling-sensitive match
#   word_boundary_strict — require \b on both sides; extra caution
# =============================================================================

# ---------------------------------------------------------------------------
# 1. Georgia — U.S. state vs. Republic of Georgia (ISO 3166: GEO)
# ---------------------------------------------------------------------------
