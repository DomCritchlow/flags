# ---------------------------------------------------------------------------
# 15. Samoa — American Samoa vs. independent Samoa (WSM / ASM)
# ---------------------------------------------------------------------------
samoa:
  country_iso3: WSM
  conflict_type: us_territory
  default: SKIP
  notes: >
    "Samoa" alone is ambiguous — it can mean the independent State of Samoa
    (formerly Western Samoa, ISO WSM) or American Samoa (U.S. territory,
    ISO ASM). Congressional text very frequently references American Samoa
    (delegate Aumua Amata, territorial issues). Require full name for either.
  require_full_name: true
  related_entities:
    - iso3: WSM
      names: ["Samoa", "State of Samoa", "Western Samoa", "Independent State of Samoa"]
    - code: ASM
      names: ["American Samoa"]
      type: us_territory
  country_signals:
