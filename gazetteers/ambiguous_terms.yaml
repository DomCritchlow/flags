# ---------------------------------------------------------------------------
# 5. Niger — substring sensitivity, proximity to racial slur (NER)
#    NOTE: Must enforce strict word-boundary matching (\bNiger\b).
#    Also easily confused with Nigeria (NGA). "Nigerian" != "Nigerien".
# ---------------------------------------------------------------------------
niger:
  country_iso3: NER
  conflict_type: substring_sensitivity
  default: COUNTRY
  word_boundary_strict: true
  notes: >
    This term requires strict word-boundary matching to avoid substring
    collision with the racial slur and with "Nigeria" / "Nigerian".
    The demonym for Niger is "Nigerien" (not "Nigerian").
  country_signals:
    strong:
      - "Republic of Niger"
      - "Niamey"
      - "Nigerien"
      - "Niger Republic"
      - "Niger River"
      - "Sahel"
      - "G5 Sahel"
      - "Agadez"
      - "Bazoum"
      - "Mohamed Bazoum"
      - "Niger coup"
      - "ECOWAS"
      - "Nigerien military"
      - "Nigerien government"
      - "Air Base 201"
    moderate:
      - "Africa"
      - "African"
      - "Saharan"
      - "Boko Haram"
      - "counterterrorism"
      - "French forces"
      - "uranium"
      - "migration"
      - "drought"
      - "AFRICOM"
  non_country_signals:
    strong:
      - "Nigeria"
      - "Nigerian"
      - "Niger Delta"
      - "Niger State"
    moderate: []

# ---------------------------------------------------------------------------
# 6. Colombia — spelling collision with "Columbia" (COL)
#    Columbia = District of Columbia, Columbia University, Columbia River, etc.
# ---------------------------------------------------------------------------
colombia:
  country_iso3: COL
  conflict_type: spelling_collision
  default: COUNTRY
  exact_spelling: true
  notes: >
    "Colombia" (with an 'o') is the country. "Columbia" (with a 'u') is NOT
    the country. The matcher must be case-insensitive but spelling-sensitive.
    Common false positives: District of Columbia, Columbia University,
    Columbia River, British Columbia, Columbia SC, Columbia MO.
  country_signals:
    strong:
      - "Bogotá"
      - "Bogota"
      - "Colombian"
      - "Republic of Colombia"
      - "Medellín"
      - "Medellin"
      - "FARC"
      - "ELN"
      - "Petro"
      - "Gustavo Petro"
      - "Duque"
      - "Santos"
      - "Plan Colombia"
      - "Colombian government"
      - "Colombian military"
      - "Cali"
      - "Cartagena"
      - "coca"
      - "cocaine"
    moderate:
      - "Latin America"
      - "Andean"
      - "South America"
      - "narcotics"
      - "trafficking"
      - "peace process"
      - "extradition"
      - "paramilitaries"
      - "Venezuela"
  non_country_signals:
    strong:
      - "Columbia"
      - "District of Columbia"
      - "Columbia University"
      - "Columbia River"
      - "British Columbia"
      - "Columbia, South Carolina"
      - "Columbia, Missouri"
      - "Columbia Pictures"
      - "Columbia Records"
      - "pre-Columbian"
    moderate: []

# ---------------------------------------------------------------------------
# 7. Guinea — multi-country ambiguity (GIN, GNQ, GNB, PNG)
#    Guinea, Equatorial Guinea, Guinea-Bissau, Papua New Guinea
# ---------------------------------------------------------------------------
guinea:
  country_iso3: GIN
  conflict_type: multi_country
  default: SKIP
  require_full_name: true
  related_countries:
    - iso3: GIN
      names: ["Guinea", "Republic of Guinea"]
    - iso3: GNQ
      names: ["Equatorial Guinea"]
    - iso3: GNB
      names: ["Guinea-Bissau", "Guinea Bissau"]
    - iso3: PNG
      names: ["Papua New Guinea"]
  notes: >
    Bare "Guinea" is too ambiguous — could be any of four countries or the
    guinea pig, guinea fowl, guinea coin, or a racial slur. Always require
    the full country name or a capital-city signal.
  country_signals:
    strong:
      - "Republic of Guinea"
      - "Conakry"
      - "Guinean"
      - "Equatorial Guinea"
      - "Malabo"
      - "Guinea-Bissau"
      - "Bissau"
      - "Papua New Guinea"
      - "Port Moresby"
      - "Condé"
      - "Alpha Condé"
      - "Obiang"
      - "Teodoro Obiang"
    moderate:
      - "West Africa"
      - "West African"
      - "ECOWAS"
      - "Pacific Islands"
      - "Melanesia"
      - "bauxite"
  non_country_signals:
    strong:
      - "guinea pig"
      - "guinea fowl"
      - "guinea hen"
      - "New Guinea"
    moderate: []

