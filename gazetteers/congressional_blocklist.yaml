# ---------------------------------------------------------------------------
# Regex blocklist: patterns that need regex matching rather than exact string.
# These are applied after procedural_strips but before country detection.
# ---------------------------------------------------------------------------
regex_blocklist:
  # Congressional member references with country-like names
  - "(?:Mr|Mrs|Ms|Miss|Dr)\\.\\s+(?:Georgia|Jordan|Chad|Israel|Marshall|Cuba|Mali|Montenegro)\\b"
  - "(?:Representative|Senator|Congressman|Congresswoman|Chairman|Chairwoman|Ranking Member)\\s+(?:Georgia|Jordan|Chad|Israel|Marshall|Cuba|Mali|Montenegro)\\b"

  # State possessives with district numbers (catches "Georgia's 5th")
  - "Georgia's\\s+\\d+"
  - "Jordan's\\s+(?:amendment|motion|objection|point|resolution|bill)"

  # "from STATE" patterns that might not be caught by procedural_strips
  - "(?:elected|appointed|hailing)\\s+from\\s+Georgia"

  # Common false-positive patterns for Turkey
  - "(?:roast|fried|smoked|wild|stuffed|frozen|organic|free-range)\\s+turkey"
  - "turkey\\s+(?:dinner|lunch|sandwich|burger|breast|leg|wing|meat|bacon|sausage)"

  # Lowercase "chad" in ballot/election context
  - "(?:punch|paper|ballot|vote|voting)\\s+chad"

  # Guinea pig / guinea fowl in any form
  - "guinea\\s+(?:pig|pigs|fowl|hens?|worm)"

  # Cypress tree references
  - "cypress\\s+(?:tree|trees|wood|swamp|grove|forest|knee|knees|bark)"

  # Columbia variations (not Colombia)
  - "Columbi(?:a|an)\\s+(?:University|River|Heights|Gas|Pictures|Records|Broadcasting|County|Basin)"
  - "(?:District|City|Province)\\s+of\\s+Columbia"
  - "(?:British|South)\\s+Columbia"

  # Niger substring protection — block "Nigeria" from matching "Niger"
  - "Nigeria[n]?"

  # People named with country names + common surname patterns
  - "(?:Chad|Israel|Jordan|Marshall|Mali|Cuba)\\s+[A-Z][a-z]+(?:\\s+[A-Z][a-z]+)?"

  # "made in COUNTRY" for product/manufacturing context (optional — may want to keep)
  # - "made\\s+in\\s+(?:China|India|Turkey|Japan|Korea)"
