# =============================================================================
# congressional_blocklist.yaml
# Congressional World View — Pre-filter Blocklist
#
# Phrases to mask BEFORE country-name detection runs. These are strings that
# contain a country name (or partial match) but are NOT country references.
# The pipeline replaces each phrase with a placeholder token so downstream
# matchers never see the false-positive trigger.
#
# Categories:
#   blocklist_phrases    — exact phrases to mask (case-insensitive)
#   procedural_strips    — congressional procedural templates ({STATE} expands
#                          to all 50 U.S. states + territories)
#   regex_blocklist      — patterns requiring regex matching
# =============================================================================

# ---------------------------------------------------------------------------
