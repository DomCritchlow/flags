name: Weekly Country Ingestion

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'

  workflow_dispatch:
    inputs:
      target_month:
        description: 'Target month (YYYY-MM), "current", or "previous"'
        required: false
        default: 'current'

env:
  CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full pipeline
        run: |
          TARGET=${{ github.event.inputs.target_month || 'current' }}
          echo "Target month: $TARGET"
          PYTHONPATH=. python -m pipeline.run --month "$TARGET" --buffer-days 3

      - name: Update Executive Orders
        run: |
          PYTHONPATH=. python -m scripts.ingest_executive_orders
          PYTHONPATH=. python -m scripts.reprocess_executive
          PYTHONPATH=. python -m pipeline.export_executive

      - name: Commit data updates
        run: |
          cp data/aggregated/*.json docs/data/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "data: weekly ingestion $(date +%Y-%m-%d) [buffer ±3d]"
          git push
