name: Monthly Country Ingestion

on:
  schedule:
    # 3rd of every month at 06:00 UTC
    # Why the 3rd: gives Congress.gov API 2-3 days to publish records
    # from the last days of the previous month.
    - cron: '0 6 3 * *'

  workflow_dispatch:
    inputs:
      target_month:
        description: 'Target month (YYYY-MM), or "previous" for last month'
        required: false
        default: 'previous'

env:
  CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full pipeline
        run: |
          TARGET=${{ github.event.inputs.target_month || 'previous' }}
          echo "Target month: $TARGET"
          PYTHONPATH=. python -m pipeline.run --month "$TARGET" --buffer-days 5

      - name: Commit data updates
        run: |
          cp data/aggregated/*.json docs/data/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "data: $(date +%Y-%m) monthly ingestion [buffer ±5d]"
          git push
